<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - J.A.R.V.I.S Security System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }
        
        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--glow-primary);
            position: relative;
            z-index: 10;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        .login-logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            animation: rotateRing 8s linear infinite;
        }
        
        .login-logo-ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            animation-direction: reverse;
            animation-duration: 6s;
        }
        
        .login-logo-core {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 25%;
            left: 25%;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            border-radius: 50%;
            animation: corePulse 2s ease-in-out infinite;
        }
        
        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group input {
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-speed);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        
        .form-group input::placeholder {
            color: var(--text-secondary);
        }
        
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .remember-me input {
            accent-color: var(--primary-color);
        }
        
        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-speed);
        }
        
        .forgot-password:hover {
            color: var(--accent-color);
        }
        
        .login-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all var(--transition-speed);
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .login-btn:hover::before {
            left: 100%;
        }
        
        .login-error {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--danger-color);
            border-radius: 10px;
            padding: 15px;
            color: var(--danger-color);
            text-align: center;
            display: none;
        }
        
        .login-error.show {
            display: block;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        /* Background animation */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }
        
        .bg-circle {
            position: absolute;
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }
        
        .bg-circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -300px;
            left: -300px;
        }
        
        .bg-circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -200px;
            right: -200px;
            animation-delay: 1s;
        }
        
        .bg-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        /* Loading state */
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: var(--bg-dark);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Background Animation -->
        <div class="bg-animation">
            <div class="bg-circle"></div>
            <div class="bg-circle"></div>
            <div class="bg-circle"></div>
        </div>
        
        <!-- Login Box -->
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <div class="login-logo-ring"></div>
                    <div class="login-logo-ring"></div>
                    <div class="login-logo-core"></div>
                </div>
                <h1 class="login-title">JARVIS</h1>
                <p class="login-subtitle">Security System Authentication</p>
            </div>
            
            <div class="login-error" id="loginError"></div>
            
            <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
        </div>
    </div>
    
    <script>
        function getApiBase() {
            if (window.location.protocol === 'file:') {
                return null;
            }

            const origin = window.location.origin;
            const path = window.location.pathname.replace(/\\/g, '/');

            if (path.includes('/frontend/pages/')) {
                const root = path.split('/frontend/pages/')[0];
                return `${origin}${root}/backend/php/api`;
            }
            if (path.includes('/frontend/')) {
                const root = path.split('/frontend/')[0];
                return `${origin}${root}/backend/php/api`;
            }

            return `${origin}/backend/php/api`;
        }

        async function parseApiResponse(response) {
            const text = await response.text();
            let data = null;

            try {
                data = text ? JSON.parse(text) : null;
            } catch (e) {
                data = null;
            }

            if (!response.ok) {
                throw new Error((data && data.error) ? data.error : `Request failed (${response.status})`);
            }

            if (!data || typeof data !== 'object') {
                const compact = (text || '').replace(/\s+/g, ' ').trim();
                const preview = compact ? compact.slice(0, 180) : '(empty response)';
                throw new Error(`Invalid API response: ${preview}`);
            }

            return data;
        }

        const API_BASE = getApiBase();
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            const loginError = document.getElementById('loginError');
            const params = new URLSearchParams(window.location.search);
            const isManualLogout = params.get('logged_out') === '1';

            if (!API_BASE) {
                loginError.textContent = 'App is opened as a local file. Please use the web server URL.';
                loginError.classList.add('show');
                return;
            }

            if (isManualLogout) {
                try {
                    await fetch(`${API_BASE}/auth.php`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'logout' })
                    });
                } catch (e) {
                    // Ignore; we still stay on login screen.
                }

                sessionStorage.removeItem('user');
                sessionStorage.removeItem('jarvis_welcomed');
                localStorage.removeItem('user');
                localStorage.removeItem('jarvis_welcomed');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth.php`);
                const data = await parseApiResponse(response);
                // Intentionally do not auto-redirect to dashboard.
                // User must explicitly sign in from this page.
            } catch (error) {
                console.error('Auth check error:', error);
            }
        });
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            // Reset error
            loginError.classList.remove('show');
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.textContent = 'Authenticating...';
            
            try {
                if (!API_BASE) {
                    throw new Error('App is opened as a local file. Please use the web server URL.');
                }

                const response = await fetch(`${API_BASE}/auth.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });
                
                const data = await parseApiResponse(response);
                
                if (data.success) {
                    // Store user info
                    sessionStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // Redirect to dashboard
                    window.location.href = '../index.html';
                } else {
                    // Show error
                    loginError.textContent = data.error || 'Login failed. Please try again.';
                    loginError.classList.add('show');
                    
                    // Reset button
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = error && error.message
                    ? error.message
                    : 'Connection error. Please check your network.';
                loginError.classList.add('show');
                
                // Reset button
                loginBtn.classList.remove('loading');
                loginBtn.textContent = 'Sign In';
            }
            
            return false;
        }
        
        function showForgotPassword() {
            alert('Please contact your system administrator to reset your password.');
        }
        
        // Enter key handling
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
